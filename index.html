<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Simon Says Game</title>
</head>
<body>
    <h1 class="text-center heading">Simon Says Game</h1>
    <h2 class="text-center">Start your game</h2>
    <div class="box">
        <div class="box1">
            <div class="green Btn btn btn-success" id="green"></div>
        <div class="red Btn btn btn-danger" id="red"></div>
        </div>
        <div class="box2">
            <div class="orange Btn btn btn-warning" id="orange"></div>
            <div class="info Btn btn btn-info" id="info"></div>
        </div>
    </div>
    <button type="button" class="play btn btn-dark">Play</button>
<script src="app.js"></script>
</div>
</body>
</html>
